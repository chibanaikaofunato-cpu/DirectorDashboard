<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>院長AIダッシュボード</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#f4f6f8;margin:0}
header{background:#1f4e79;color:white;padding:22px;text-align:center;font-size:28px;font-weight:bold}
main{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;padding:22px}
.card{background:white;border-radius:14px;padding:20px;box-shadow:0 2px 8px #0002}
h2{color:#1f4e79;margin-top:0}
button{background:#1f4e79;color:white;border:0;border-radius:8px;padding:10px 16px}
</style>
</head>
<body>
<header>院長AIダッシュボード Ver.2</header>
<main>
<section class="card"><h2>SOAP作成</h2><p>診察音声・メモからSOAPを作成します。</p><button>開く</button></section>
<section class="card"><h2>生活習慣病管理料</h2><p>SOAPと一体化してカルテ貼付文を作成します。</p><button>開く</button></section>
<section class="card"><h2>訪問診療</h2><p>訪問予定・看護記録・算定漏れを確認します。</p><button>開く</button></section>
<section class="card"><h2>紹介状</h2><p>循環器・甲状腺・泌尿器などの紹介状を作成します。</p><button>開く</button></section>
<section class="card"><h2>処方提案</h2><p>症状・年齢・既往歴から候補を整理します。</p><button>開く</button></section>
<section class="card"><h2>今日の業務</h2><p>外来・訪問・介護審査会・スタッフ連絡を一覧化します。</p></section>
</main>
</body>
</html>
